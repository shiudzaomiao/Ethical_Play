<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程伦理情景模拟</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-glow: #7c3aed;
            --secondary-glow: #3b82f6;
            --bg-dark: #1a1a2e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(124, 58, 237, 0.3);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #34d399;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: transparent;
            padding: 0 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .round-indicator {
            background: var(--card-bg);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--border-glow);
            font-weight: 600;
            color: #a78bfa;
        }

        .image-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 修改回横向 4 列 */
            gap: 20px;
            margin-bottom: 35px;
            width: 100%;
            max-width: 1200px; /* 增加宽度以适应横向排布 */
            margin-left: auto;
            margin-right: auto;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2); /* 稍微深一点的背景感 */
            border-radius: 16px;
        }

        .image-card {
            aspect-ratio: 1/1;
            background: #1a1a1a;
            border-radius: 12px; /* 增加圆角，横向排布时圆角更好看 */
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .image-card img {
            width: 200%; /* 因为是一张图切四块，所以每块显示 200% 宽度 */
            height: 200%;
            object-fit: cover;
            position: absolute;
        }

        /* 四格切片位置控制 */
        .image-card[data-panel="1"] img { top: 0; left: 0; }
        .image-card[data-panel="2"] img { top: 0; left: -100%; }
        .image-card[data-panel="3"] img { top: -100%; left: 0; }
        .image-card[data-panel="4"] img { top: -100%; left: -100%; }

        .scenario {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            margin-bottom: 40px;
            line-height: 1.8;
            color: #e2e8f0;
            min-height: 180px;
            font-size: 1.2rem;
            border: 1px solid var(--border-glow);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .scenario::before {
            content: "CASE SCENE";
            position: absolute;
            top: -12px;
            left: 30px;
            background: var(--primary-glow);
            padding: 4px 15px;
            border-radius: 4px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .bottom-section {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .options-grid button {
            padding: 20px 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .options-grid button span {
            color: var(--primary-glow);
            font-weight: 800;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.3rem;
        }

        .options-grid button:hover {
            background: rgba(124, 58, 237, 0.15);
            border-color: var(--primary-glow);
            transform: translateX(10px);
            box-shadow: 0 5px 15px rgba(124, 58, 237, 0.2);
        }

        .custom-input-group {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .custom-input-group:focus-within {
            border-color: var(--secondary-glow);
            background: rgba(255, 255, 255, 0.05);
        }

        .custom-input-group input {
            flex: 1;
            padding: 20px 30px;
            background: transparent;
            border: none;
            font-size: 1.1rem;
            color: #fff;
            outline: none;
        }

        .custom-input-group button {
            padding: 0 40px;
            background: var(--secondary-glow);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .custom-input-group button:hover {
            background: #2563eb;
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: var(--primary-glow);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(124, 58, 237, 0.2);
            border-top: 4px solid var(--primary-glow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .analysis-report {
            background: var(--card-bg);
            border: 1px solid var(--success);
            padding: 40px;
            border-radius: 24px;
            animation: fadeIn 0.8s ease-out;
        }

        .analysis-report h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2.5rem;
            color: var(--success);
            margin-bottom: 25px;
            text-align: center;
        }

        .analysis-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #f1f5f9;
            background: rgba(0, 0, 0, 0.2);
            padding: 35px;
            border-radius: 16px;
            margin-bottom: 30px;
            overflow-y: auto;
            max-height: 60vh;
        }

        .analysis-content h1, .analysis-content h2, .analysis-content h3 {
            color: var(--success);
            margin-top: 25px;
            margin-bottom: 15px;
            font-family: 'Barlow Condensed', sans-serif;
        }

        .analysis-content h1 { font-size: 2rem; border-bottom: 1px solid rgba(52, 211, 153, 0.2); padding-bottom: 10px; }
        .analysis-content h2 { font-size: 1.6rem; }
        .analysis-content h3 { font-size: 1.3rem; }

        .analysis-content p { margin-bottom: 15px; }
        
        .analysis-content ul, .analysis-content ol {
            margin-bottom: 20px;
            padding-left: 25px;
        }

        .analysis-content li { margin-bottom: 10px; }

        .analysis-content strong { color: var(--success); font-weight: 700; }

        .analysis-content hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 30px 0;
        }

        .analysis-content blockquote {
            border-left: 4px solid var(--success);
            padding-left: 20px;
            margin: 20px 0;
            color: var(--text-muted);
            font-style: italic;
        }

        .back-btn {
            display: block;
            margin: 0 auto;
            padding: 15px 40px;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        /* MBTI 可视化样式 */
        .mbti-container {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mbti-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .mbti-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #a78bfa;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .mbti-tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mbti-tag {
            background: rgba(167, 139, 250, 0.2);
            color: #a78bfa;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid rgba(167, 139, 250, 0.3);
        }

        .mbti-desc {
            font-size: 1.1rem;
            color: #94a3b8;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .mbti-visuals {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
            align-items: center;
        }

        .mbti-radar-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 20px;
            height: 350px;
        }

        .mbti-sliders {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .mbti-slider-group {
            width: 100%;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        .slider-track {
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .slider-fill {
            position: absolute;
            top: 0;
            width: 20px;
            height: 100%;
            background: #a78bfa;
            box-shadow: 0 0 15px #a78bfa;
            border-radius: 10px;
            transform: translateX(-50%);
            transition: left 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @media (max-width: 900px) {
            .mbti-visuals { grid-template-columns: 1fr; }
            .mbti-radar-box { height: 300px; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .options-grid { grid-template-columns: 1fr; }
            .image-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">生成场景中...</div>
    </div>

    <div class="container" id="mainContainer">
        <div class="header">
            <div class="logo">Ethical Play</div>
            <div class="round-indicator" id="roundIndicator">第 1 轮 / 共 5 轮</div>
        </div>

        <div class="image-row">
            <div class="image-card" id="part1" data-panel="1"></div>
            <div class="image-card" id="part2" data-panel="2"></div>
            <div class="image-card" id="part3" data-panel="3"></div>
            <div class="image-card" id="part4" data-panel="4"></div>
        </div>

        <div id="scenario" class="scenario">准备中...</div>

        <div class="bottom-section" id="interactionArea">
            <div class="options-grid">
                <button id="optA"><span>A</span> <div class="text">选项A</div></button>
                <button id="optB"><span>B</span> <div class="text">选项B</div></button>
                <button id="optC"><span>C</span> <div class="text">选项C</div></button>
                <button id="optD"><span>D</span> <div class="text">选项D</div></button>
            </div>
            <div class="custom-input-group">
                <input type="text" id="customInput" placeholder="输入你的个性化决策方案...">
                <button id="customBtn">提交决策</button>
            </div>
        </div>
    </div>

    <script>
        // ========== API 配置（通过本地后端代理） ==========
        const API_BASE = '/api/ark';

        let profession = '';
        let currentRound = 1;
        let historySummary = '';
        let currentScenario = '';
        let currentOptions = null;

        const overlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const roundIndicator = document.getElementById('roundIndicator');

        // ========== 图像处理（单张填充） ==========
        function renderImageToPart(imageUrl, index) {
            if (!imageUrl) return;
            const target = document.getElementById(`part${index}`);
            if (!target) return;

            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = function () {
                target.innerHTML = '';
                target.appendChild(img);
                // 这里的样式已在 CSS 中处理，这里只需确保图片加载成功
                target.style.opacity = '0';
                setTimeout(() => { target.style.transition = 'opacity 1s'; target.style.opacity = '1'; }, 10);
            };
            img.onerror = () => {
                target.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#ff4444;font-size:10px;">加载失败</div>';
            };
            img.src = imageUrl;
        }

        // ========== 图像生成 (单图生成 + 四格切片 + 图生图) ==========
        async function generateAllImages(options, scenario) {
            // 获取角色特征、漫画风格以及参考图 URL
            const charPrompt = localStorage.getItem('character_prompt') || profession;
            const stylePrompt = localStorage.getItem('comic_style_prompt') || '赛博朋克风格';
            const refImageUrl = localStorage.getItem('ref_image_url');
            
            // 敏感词清理函数：避免触发大模型安全审核
            const cleanPrompt = (text) => {
                if (!text) return "";
                // 替换掉容易引起敏感拦截的词汇，改用中性词
                return text
                    .replace(/伦理|道德/g, "职业")
                    .replace(/困境|危机|危险|事故/g, "场景")
                    .replace(/死亡|杀|命/g, "处理")
                    .replace(/血|爆炸|冲突/g, "工作")
                    .substring(0, 100); // 限制长度，减少敏感信息堆积
            };

            const safeScenario = cleanPrompt(scenario);
            const safeA = cleanPrompt(options.A);
            const safeB = cleanPrompt(options.B);
            const safeC = cleanPrompt(options.C);
            const safeD = cleanPrompt(options.D);

            // 构建漫画 Prompt：要求生成四格分镜
            const prompt = `${stylePrompt}。四格漫画分镜（4-panel comic strip, 2x2 grid layout）。
            主角是一个${charPrompt}，必须在所有格子中保持与参考图一致的形象。
            场景：${safeScenario}。
            四个分镜内容：
            1. 故事背景和初始情境
            2. 伦理困境的发展
            3. 主角面临的选择
            4. 选择后的结果
            高质量，分镜清晰，反映当前轮次的故事内容。`;
            
            try {
                const response = await fetch(`${API_BASE}/images`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt,
                        ref_image_url: refImageUrl // 传递参考图实现图生图
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    if (errorData.details && errorData.details.error && errorData.details.error.code === 'InputTextSensitiveContentDetected') {
                        console.warn("检测到敏感词，尝试使用极简 Prompt 生成...");
                        // 极简兜底 Prompt
                        const fallbackPrompt = `${stylePrompt}。四格漫画分镜。主角是一个${charPrompt}。工作中。高质量。`;
                        return retryGenerate(fallbackPrompt, refImageUrl);
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                if (data.data && data.data[0] && data.data[0].url) {
                    const proxyUrl = `${API_BASE}/proxy-image?url=${encodeURIComponent(data.data[0].url)}`;
                    // 将同一张图分发给四个格子，CSS 会负责切片显示
                    for (let i = 1; i <= 4; i++) {
                        renderImageToPart(proxyUrl, i);
                    }
                } else {
                    throw new Error('No valid image URL returned');
                }
            } catch (e) {
                console.error(`漫画生成失败:`, e);
                for (let i = 1; i <= 4; i++) {
                    const target = document.getElementById(`part${i}`);
                    if (target) target.innerHTML = '<div style="color:#ff4444;font-size:10px;">生成失败</div>';
                }
            }
        }

        // 兜底重试函数
        async function retryGenerate(fallbackPrompt, refImageUrl) {
            try {
                const response = await fetch(`${API_BASE}/images`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: fallbackPrompt,
                        ref_image_url: refImageUrl
                    })
                });
                const data = await response.json();
                if (data.data && data.data[0] && data.data[0].url) {
                    const proxyUrl = `${API_BASE}/proxy-image?url=${encodeURIComponent(data.data[0].url)}`;
                    for (let i = 1; i <= 4; i++) renderImageToPart(proxyUrl, i);
                }
            } catch (e) {
                console.error("重试生成也失败了:", e);
            }
        }

        // ========== 获取下一轮（流式代理） ==========
        async function fetchNextRound(isCustom=false, customContent='') {
            console.log("Starting fetchNextRound, profession:", profession);
            try {
                overlay.style.display = 'flex';
                loadingText.innerText = "AI 正在构思场景...";
                roundIndicator.innerText = "第 " + currentRound + " 轮 / 共 5 轮";

                // 【修复】：进入下一题前，立即清空旧的选项和场景
                document.getElementById('scenario').innerText = "准备中...";
                updateOptions({ A: '...', B: '...', C: '...', D: '...' });
                currentOptions = null;

                for(let i=1; i<=4; i++) {
                    const target = document.getElementById(`part${i}`);
                    if (target) target.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;font-size:12px;">AI 画布绘制中...</div>';
                }

                const systemPrompt = `你是一个工程伦理专家。请根据用户的职业(${profession})，生成一个具有挑战性的伦理困境。
                这是第${currentRound}轮，整个故事需要有连贯性，每轮都是故事的一部分，最终形成一个完整的伦理故事。
                必须严格按照以下 JSON 格式输出，不要包含任何 Markdown 标记或额外说明文字：
                {
                    "scenario": "详细的伦理困境场景描述...",
                    "options": {
                        "A": "第一个选项内容",
                        "B": "第二个选项内容",
                        "C": "第三个选项内容",
                        "D": "第四个选项内容"
                    }
                }`;

                const userPrompt = isCustom ? `用户的自定义决策：${customContent}` : (currentRound === 1 ? `请开始第一轮。` : `历史记录：${historySummary}`);

                // 获取当前用户ID用于统计
                let userId = null;
                const token = localStorage.getItem('token');
                if (token) {
                    try { userId = JSON.parse(atob(token.split('.')[1])).id; } catch(e) {}
                }

                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userPrompt }
                        ],
                        stream: true,
                        user_id: userId // 传给后端记录统计
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.msg || errData.error || `HTTP ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                let hasHiddenOverlay = false;
                let hasTriggeredImages = false; // 并发触发标记

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        const trimmedLine = line.trim();
                        if (!trimmedLine.startsWith('data: ')) continue;
                        
                        const dataStr = trimmedLine.slice(6).trim();
                        if (dataStr === '[DONE]') continue;
                        
                        try {
                            const data = JSON.parse(dataStr);
                            const delta = data.choices[0].delta;
                            const content = delta.content || '';
                            const reasoning = delta.reasoning_content || '';
                            
                            if (reasoning && !hasHiddenOverlay) {
                                document.getElementById('scenario').innerText = "AI 思考中: " + reasoning;
                                overlay.style.display = 'none';
                                hasHiddenOverlay = true;
                            }

                            fullText += content;

                            // 1. 实时渲染场景文本
                            const scenarioMatch = fullText.match(/"scenario"\s*:\s*"(.*?)(?:"|(?=\s*,\s*"options")|$)/s);
                            if (scenarioMatch && scenarioMatch[1]) {
                                let cleanText = scenarioMatch[1]
                                    .replace(/\\n/g, '\n')
                                    .replace(/\\"/g, '"')
                                    .replace(/\\t/g, '\t')
                                    .replace(/\\/g, '');
                                
                                if (cleanText.endsWith('\\')) cleanText = cleanText.slice(0, -1);
                                document.getElementById('scenario').innerText = cleanText;
                                currentScenario = cleanText; // 实时更新全局场景
                                
                                if (!hasHiddenOverlay && cleanText.length > 3) {
                                    overlay.style.display = 'none';
                                    hasHiddenOverlay = true;
                                }
                            }

                            // 2. 核心并发逻辑：一旦解析出完整的 options，立即触发图片生成，不等流结束
                            const optionsMatch = fullText.match(/"options"\s*:\s*\{(.*?)\}/s);
                            if (optionsMatch && optionsMatch[1] && !hasTriggeredImages) {
                                try {
                                    // 检查 options 内容是否已经传输完毕（以 } 结尾）
                                    if (optionsMatch[1].trim().endsWith('}')) {
                                        const optsStr = '{' + optionsMatch[1] + '}';
                                        const opts = JSON.parse(optsStr);
                                        updateOptions(opts);
                                        
                                        // 【关键点】并发触发：此时文本流还没结束，但我们已经拿到了足够的信息开始生图
                                        console.log("并发：检测到选项已就绪，提前启动生图...");
                                        generateAllImages(opts, currentScenario);
                                        hasTriggeredImages = true;
                                    }
                                } catch(e) {
                                    // JSON 还没传完，继续等待
                                }
                            }
                        } catch (e) {}
                    }
                }

                overlay.style.display = 'none';

                // 兜底逻辑：如果因为流异常没触发生图，在这里做最后一次尝试
                if (!hasTriggeredImages) {
                    try {
                        const jsonStr = fullText.replace(/```json/g, '').replace(/```/g, '').trim();
                        const finalData = JSON.parse(jsonStr);
                        if (finalData.options) {
                            updateOptions(finalData.options);
                            generateAllImages(finalData.options, finalData.scenario);
                        }
                    } catch(e) {
                        console.error("最终兜底解析失败:", e);
                    }
                }
            } catch (e) {
                console.error("fetchNextRound error:", e);
                overlay.style.display = 'none';
                const scenarioEl = document.getElementById('scenario');
                scenarioEl.innerHTML = `<div style="color:#ff4444; font-weight:bold;">系统繁忙：${e.message}</div><div style="font-size:0.8rem; margin-top:10px; color:#999;">请检查网络连接或后端服务是否正常启动。</div>`;
            }
        }

        async function fetchFinalAnalysis() {
            try {
                overlay.style.display = 'flex';
                loadingText.innerText = "正在生成大结局...";
                
                // 1. 先渲染原有的 Markdown 深度评估报告 (流式)
                document.getElementById('mainContainer').innerHTML = `
                    <div class="analysis-report">
                        <h2>工程伦理深度评估报告</h2>
                        <div class="analysis-content" id="finalAnalysisContent">正在构思深度报告...</div>
                        <div id="mbtiSection" class="mbti-container" style="display:none; margin-top:40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:40px;">
                            <h2 style="margin-bottom:30px;">E-MBTI 人格画像</h2>
                        </div>
                        <button class="back-btn" id="backToSelectBtn" style="display:none; margin-top:40px;" onClick="window.parent.location.href='/home'">返回首页</button>
                    </div>
                `;
                const contentDiv = document.getElementById('finalAnalysisContent');
                const mbtiSection = document.getElementById('mbtiSection');
                const backBtn = document.getElementById('backToSelectBtn');
                let fullEndingText = '';

                // 首先生成大结局
                const endingResponse = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "你是一个工程伦理专家。请根据用户的决策历史生成一个完整的大结局，将之前的故事串联起来，形成一个完整的伦理故事。" },
                            { role: "user", content: `职业：${profession}\n决策历史：${historySummary}\n请生成一个完整的大结局，将所有轮次的故事串联起来。` }
                        ],
                        stream: true
                    })
                });

                if (endingResponse.ok) {
                    const endingReader = endingResponse.body.getReader();
                    const endingDecoder = new TextDecoder();
                    overlay.style.display = 'none';

                    while (true) {
                        const { done, value } = await endingReader.read();
                        if (done) break;
                        const chunk = endingDecoder.decode(value);
                        const lines = chunk.split('\n');
                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed.startsWith('data: ')) continue;
                            const dataStr = trimmed.slice(6).trim();
                            if (dataStr === '[DONE]') continue;
                            try {
                                const data = JSON.parse(dataStr);
                                const content = data.choices[0].delta.content || '';
                                fullEndingText += content;
                                if (window.marked) {
                                    contentDiv.innerHTML = `## 故事大结局\n\n${marked.parse(fullEndingText)}\n\n<div style="text-align:center; margin-top:30px;"><button class="back-btn" id="viewReportBtn">查看分析报告</button></div>`;
                                } else {
                                    contentDiv.innerText = `故事大结局\n\n${fullEndingText}\n\n\n[点击按钮查看分析报告]`;
                                }
                                contentDiv.scrollTop = contentDiv.scrollHeight;
                            } catch(e) {}
                        }
                    }
                }

                // 等待用户点击按钮后再生成报告
                await new Promise(resolve => {
                    document.getElementById('viewReportBtn').onclick = resolve;
                });

                // 然后发起原有的深度报告请求 (流式)
                loadingText.innerText = "正在进行深度分析...";
                overlay.style.display = 'flex';
                contentDiv.innerHTML = `## 故事大结局\n\n${marked.parse(fullEndingText)}\n\n---\n\n## 伦理评估报告\n\n正在生成...`;

                const reportResponse = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "你是一个工程伦理专家。请根据用户的决策历史给出深度总结评价。请务必返回 Markdown 格式的内容。" },
                            { role: "user", content: `职业：${profession}\n决策历史：${historySummary}\n请给出一个详细的伦理评估报告。` }
                        ],
                        stream: true
                    })
                });

                if (!reportResponse.ok) throw new Error("获取评估报告失败");

                const reader = reportResponse.body.getReader();
                const decoder = new TextDecoder();
                let fullReportText = '';
                overlay.style.display = 'none';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed.startsWith('data: ')) continue;
                        const dataStr = trimmed.slice(6).trim();
                        if (dataStr === '[DONE]') continue;
                        try {
                            const data = JSON.parse(dataStr);
                            const content = data.choices[0].delta.content || '';
                            fullReportText += content;
                            if (window.marked) {
                                contentDiv.innerHTML = `## 故事大结局\n\n${marked.parse(fullEndingText)}\n\n---\n\n## 伦理评估报告\n\n${marked.parse(fullReportText)}`;
                            } else {
                                contentDiv.innerText = `故事大结局\n\n${fullEndingText}\n\n---\n\n伦理评估报告\n\n${fullReportText}`;
                            }
                            contentDiv.scrollTop = contentDiv.scrollHeight;
                        } catch(e) {}
                    }
                }

                // 2. 深度报告结束后，静默加载 E-MBTI 评分数据
                loadingText.innerText = "正在生成人格画像...";
                overlay.style.display = 'flex';

                if (!window.Chart) {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/chart.js';
                    document.head.appendChild(script);
                }

                const systemPrompt = `你是一个工程伦理专家。请根据用户的职业和决策历史，生成一个类似 MBTI 的人格分析报告数据。
                必须严格按照以下 JSON 格式输出，不要包含任何额外文字：
                {
                    "title": "人格称号",
                    "description": "人格核心描述",
                    "tags": ["关键词1", "关键词2", "关键词3"],
                    "dimensions": { "PO": 50, "RS": 50, "TH": 50, "VD": 50 },
                    "radar": { "安全意识": 80, "职业操守": 70, "法律边界": 90, "经济敏感度": 60, "人文关怀": 75 }
                }`;

                const mbtiResponse = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: `职业：${profession}\n决策历史：${historySummary}` }
                        ],
                        stream: false
                    })
                });

                if (mbtiResponse.ok) {
                    const mbtiData = await mbtiResponse.json();
                    try {
                        const result = JSON.parse(mbtiData.choices[0].message.content);
                        mbtiSection.style.display = 'block';
                        renderMBTI(result);
                    } catch(e) { console.error("MBTI 数据解析失败"); }
                }

                overlay.style.display = 'none';
                // 重新获取返回按钮并显示
                const updatedBackBtn = document.getElementById('backToSelectBtn');
                if (updatedBackBtn) {
                    updatedBackBtn.style.display = 'block';
                } else {
                    // 如果返回按钮不存在，重新创建一个
                    const newBackBtn = document.createElement('button');
                    newBackBtn.className = 'back-btn';
                    newBackBtn.innerText = '返回首页';
                    newBackBtn.onclick = () => window.parent.location.href = '/home';
                    newBackBtn.style.marginTop = '40px';
                    document.querySelector('.analysis-report').appendChild(newBackBtn);
                }

                // 3. 历史记录保存
                const record = {
                    profession,
                    caseText: "多轮模拟案例",
                    analysis: fullReportText, // 保存详细的深度报告
                    date: new Date().toLocaleString()
                };
                
                function getUserHistoryKey() {
                    const token = localStorage.getItem('token');
                    if (!token) return null;
                    try {
                        const payload = JSON.parse(atob(token.split('.')[1]));
                        return 'ethical_play_history_' + payload.id;
                    } catch (e) { return null; }
                }

                try {
                    const key = getUserHistoryKey();
                    if (key) {
                        const history = JSON.parse(localStorage.getItem(key) || '[]');
                        localStorage.setItem(key, JSON.stringify([record, ...history].slice(0, 20)));
                    }
                } catch(e) {
                    console.error("Save history failed:", e);
                }

            } catch (e) {
                console.error("fetchFinalAnalysis error:", e);
                overlay.style.display = 'none';
                alert("生成报告失败，请检查网络后重试");
            }
        }

        function renderMBTI(data) {
            // 计算偏向的字母组合
            let personalityCode = '';
            personalityCode += data.dimensions.PO > 50 ? 'P' : 'O';
            personalityCode += data.dimensions.RS > 50 ? 'R' : 'S';
            personalityCode += data.dimensions.TH > 50 ? 'T' : 'H';
            personalityCode += data.dimensions.VD > 50 ? 'V' : 'D';
            
            const mbtiSection = document.getElementById('mbtiSection');
            mbtiSection.innerHTML = `
                <div class="mbti-header">
                    <div class="mbti-title">${data.title}</div>
                    <div class="mbti-tags">${data.tags.map(t => `<span class="mbti-tag">${t}</span>`).join('')}</div>
                    <div class="mbti-desc">${data.description}</div>
                    <div style="margin-top: 15px; font-size: 1.5rem; font-weight: bold; color: #a78bfa;">人格代码: ${personalityCode}</div>
                </div>
                <div class="mbti-visuals">
                    <div class="mbti-radar-box">
                        <canvas id="radarChart"></canvas>
                    </div>
                    <div class="mbti-sliders">
                        ${renderSlider("公众利益 (P)", "组织利益 (O)", data.dimensions.PO)}
                        ${renderSlider("原则主义 (R)", "权变主义 (S)", data.dimensions.RS)}
                        ${renderSlider("技术最优 (T)", "人文关怀 (H)", data.dimensions.TH)}
                        ${renderSlider("远见者 (V)", "实干家 (D)", data.dimensions.VD)}
                    </div>
                </div>
            `;

            // 初始化雷达图
            const ctx = document.getElementById('radarChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: Object.keys(data.radar),
                    datasets: [{
                        label: '伦理能力模型',
                        data: Object.values(data.radar),
                        backgroundColor: 'rgba(167, 139, 250, 0.2)',
                        borderColor: '#a78bfa',
                        pointBackgroundColor: '#a78bfa',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#fff', font: { size: 12 } },
                            ticks: { display: false, max: 100, min: 0, stepSize: 20 }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderSlider(leftLabel, rightLabel, value) {
            return `
                <div class="mbti-slider-group">
                    <div class="slider-labels">
                        <span>${leftLabel}</span>
                        <span>${rightLabel}</span>
                    </div>
                    <div class="slider-track">
                        <div class="slider-fill" style="left: ${value}%"></div>
                    </div>
                </div>
            `;
        }

        function updateOptions(opts) {
            document.querySelector('#optA .text').innerText = opts.A || '加载中...';
            document.querySelector('#optB .text').innerText = opts.B || '加载中...';
            document.querySelector('#optC .text').innerText = opts.C || '加载中...';
            document.querySelector('#optD .text').innerText = opts.D || '加载中...';
        }

        async function onOptionSelect(key) {
            historySummary += `第${currentRound}轮：${currentScenario}\n选择：${key}\n\n`;
            currentRound++;
            if (currentRound > 5) { await fetchFinalAnalysis(); return; }
            await fetchNextRound(false, '');
        }

        async function submitCustom() {
            const t = document.getElementById('customInput').value.trim();
            if (!t) return alert('请输入内容');
            historySummary += `第${currentRound}轮：${currentScenario}\n自定义：${t}\n\n`;
            currentRound++;
            if (currentRound > 5) { await fetchFinalAnalysis(); return; }
            await fetchNextRound(true, t);
            document.getElementById('customInput').value = '';
        }

        document.getElementById('optA').onclick = () => onOptionSelect('A');
        document.getElementById('optB').onclick = () => onOptionSelect('B');
        document.getElementById('optC').onclick = () => onOptionSelect('C');
        document.getElementById('optD').onclick = () => onOptionSelect('D');
        document.getElementById('customBtn').onclick = submitCustom;

        window.onload = async () => {
            const p = new URLSearchParams(location.search).get('profession');
            if (p) { profession = p; await fetchNextRound(); }
            else { document.getElementById('scenario').innerText = '请从角色选择页进入'; }
        };
    </script>
</body>
</html>
